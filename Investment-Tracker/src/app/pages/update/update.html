<div class="space-y-8">
  <header>
    <h1 class="text-2xl font-semibold text-slate-900">Update Investments</h1>
    <p class="mt-1 text-sm text-slate-600">
      Update contribution amounts and current values, or add a new investment.
    </p>
  </header>

  <div class="grid gap-8 lg:grid-cols-2">
    <!-- Update existing -->
    <section class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
      <h2 class="text-lg font-semibold text-slate-900">Edit Investment</h2>

      <div class="mt-4 space-y-4">
        <div>
          <label for="select-investment" class="block text-sm font-medium text-slate-700">
            Select investment
          </label>
          <select
            id="select-investment"
            class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500"
            [ngModel]="selectedId()"
            (ngModelChange)="onSelect($event)"
          >
            <option [ngValue]="null">Choose one...</option>
            @for (investment of investments(); track investment.id) {
              <option [ngValue]="investment.id">
                {{ investment.name }} ({{ investment.currentValue | currency }})
              </option>
            }
          </select>
        </div>

        @if (selectedId()) {
          <div>
            <label for="edit-contributed" class="block text-sm font-medium text-slate-700">
              Total contributed
            </label>
            <input
              id="edit-contributed"
              type="number"
              min="0"
              step="0.01"
              class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500"
              [ngModel]="editContributed()"
              (ngModelChange)="editContributed.set($event)"
            />
          </div>

          <div>
            <label for="edit-current" class="block text-sm font-medium text-slate-700">
              Current value
            </label>
            <input
              id="edit-current"
              type="number"
              min="0"
              step="0.01"
              class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500"
              [ngModel]="editCurrentValue()"
              (ngModelChange)="editCurrentValue.set($event)"
            />
          </div>

          <div>
            <label for="edit-notes" class="block text-sm font-medium text-slate-700">
              Notes (optional)
            </label>
            <textarea
              id="edit-notes"
              rows="3"
              class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500"
              [ngModel]="editNotes()"
              (ngModelChange)="editNotes.set($event)"
            ></textarea>
          </div>

          <button
            type="button"
            class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-700"
            (click)="saveChanges()"
          >
            Save changes
          </button>
        }
      </div>
    </section>

    <!-- Add new -->
    <section class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
      <h2 class="text-lg font-semibold text-slate-900">Add Investment</h2>

      <div class="mt-4 space-y-4">
        <div>
          <label for="new-name" class="block text-sm font-medium text-slate-700">Name</label>
          <input
            id="new-name"
            type="text"
            placeholder="e.g. Vanguard 401(k)"
            class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500"
            [ngModel]="newName()"
            (ngModelChange)="newName.set($event)"
          />
        </div>

        <div>
          <label for="new-type" class="block text-sm font-medium text-slate-700">Type</label>
          <select
            id="new-type"
            class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500"
            [ngModel]="newType()"
            (ngModelChange)="newType.set($event)"
          >
            @for (type of investmentTypes; track type) {
              <option [value]="type">{{ typeLabels[type] }}</option>
            }
          </select>
        </div>

        <div>
          <label for="new-contributed" class="block text-sm font-medium text-slate-700">
            Total contributed
          </label>
          <input
            id="new-contributed"
            type="number"
            min="0"
            step="0.01"
            class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500"
            [ngModel]="newContributed()"
            (ngModelChange)="newContributed.set($event)"
          />
        </div>

        <div>
          <label for="new-current" class="block text-sm font-medium text-slate-700">
            Current value
          </label>
          <input
            id="new-current"
            type="number"
            min="0"
            step="0.01"
            class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500"
            [ngModel]="newCurrentValue()"
            (ngModelChange)="newCurrentValue.set($event)"
          />
        </div>

        <button
          type="button"
          class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800"
          (click)="addInvestment()"
        >
          Add investment
        </button>
      </div>
    </section>
  </div>
</div>
